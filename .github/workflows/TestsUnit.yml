name: Tests - Unit

on: pull_request

jobs:
  testRunner:
    name: "🧪 Test - Unit - ${{ matrix.testCategory }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testCategory:
          - Performance
          - Runtime
          - AutoCancel
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          android: true

      - name: Cache Library
        uses: actions/cache@v3
        with:
          path: FlowEnt.Builder/Library
          key: Library-${{ matrix.testCategory }}
          restore-keys: Library-

      - name: Add compilation symbols to csc.rsp
        run: |
          echo "-define:FlowEnt_GitHub_Run" >> ./FlowEnt.Builder/Assets/csc.rsp
          echo "-define:FlowEnt_Debug_Editor" >> ./FlowEnt.Builder/Assets/csc.rsp
          if [[ "${{ matrix.testCategory }}" == "AutoCancel" ]]; then
            echo "-define:FlowEnt_AutoCancel" >> ./FlowEnt.Builder/Assets/csc.rsp
          fi

      - name: Run Tests
        uses: game-ci/unity-test-runner@v4
        id: testsRunner
        env:
          UNITY_LICENCE: ${{ secrets.UNITY_LICENCE }}
          UNITY_EMAIL: ${{ secrets.UNITY_USERNAME }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: FlowEnt.Builder
          testMode: playmode
          customParameters: -testCategory ${{ matrix.testCategory }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: "🧪 Test - Unit - ${{ matrix.testCategory }} - Results"

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "🧪 Test - Unit - ${{ matrix.testCategory }} - Results"
          path: ${{ steps.testsRunner.outputs.artifactsPath }}

      - name: Publish Results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: "🧪 Test - Unit - ${{ matrix.testCategory }} - Results"
          path: ${{ steps.testsRunner.outputs.artifactsPath }}/*.xml
          reporter: dotnet-nunit
